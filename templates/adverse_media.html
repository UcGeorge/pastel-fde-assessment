{{define "adverse_media"}}
<div class="animate-fade-in">
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-lg bg-rose-500/10 border border-rose-500/20 flex items-center justify-center">
                <svg class="w-4 h-4 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5h1.5m-1.5 3h1.5m-7.5 3h7.5m-7.5 3h7.5m3-9h3.375c.621 0 1.125.504 1.125 1.125V18a2.25 2.25 0 01-2.25 2.25M16.5 7.5V18a2.25 2.25 0 002.25 2.25M16.5 7.5V4.875c0-.621-.504-1.125-1.125-1.125H4.125C3.504 3.75 3 4.254 3 4.875V18a2.25 2.25 0 002.25 2.25h13.5M6 7.5h3v3H6v-3z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Adverse Media Screening</h2>
        </div>
        <p class="text-gray-400">Search news and media sources for negative coverage linked to an individual or entity.</p>
    </div>

    <form hx-post="/adverse-media/check" hx-target="#adverse-media-result" hx-indicator="#adverse-media-loading" class="space-y-6">
        <div class="bg-surface-900/60 border border-surface-800/60 rounded-2xl p-6">
            <h3 class="text-sm font-semibold text-gray-300 mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                Search Parameters
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Individual or Entity Name</label>
                    <input type="text" name="query" value="Vladimir Putin" class="w-full bg-surface-950/60 border border-surface-700/60 rounded-xl px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-brand-500/60 focus:ring-1 focus:ring-brand-500/30 transition-all placeholder-gray-600" placeholder="Enter name to search..." required>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1.5">Result Limit</label>
                    <input type="number" name="limit" value="10" min="1" max="100" class="w-full bg-surface-950/60 border border-surface-700/60 rounded-xl px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-brand-500/60 focus:ring-1 focus:ring-brand-500/30 transition-all placeholder-gray-600">
                </div>
            </div>
        </div>

        <button type="submit" class="htmx-hide-on-request w-full bg-gradient-to-r from-rose-600 to-rose-500 hover:from-rose-500 hover:to-rose-400 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-rose-500/20 hover:shadow-rose-500/30 active:scale-[0.98]">
            Search Adverse Media
        </button>

        <div id="adverse-media-loading" class="htmx-indicator justify-center py-3">
            <div class="flex items-center gap-3 text-gray-400">
                <svg class="animate-spin w-5 h-5 text-rose-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                <span class="text-sm font-medium">Searching media sources for adverse coverage...</span>
            </div>
        </div>
    </form>

    <div id="adverse-media-result" class="mt-6"></div>
</div>
{{end}}
