{{define "screening"}}
<div class="animate-fade-in">
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-lg bg-amber-500/10 border border-amber-500/20 flex items-center justify-center">
                <svg class="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">PEP & Sanctions Screening</h2>
        </div>
        <p class="text-gray-400">Screen individuals against global PEP lists and international sanctions databases.</p>
    </div>

    <div class="bg-surface-900/60 border border-surface-800/60 rounded-2xl p-6 mb-6">
        <h3 class="text-sm font-semibold text-gray-300 mb-4 flex items-center gap-2">
            <svg class="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            Individual Details
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Full Name</label>
                <input type="text" id="screen-name" name="name" value="Vladimir Putin" class="w-full bg-surface-950/60 border border-surface-700/60 rounded-xl px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-brand-500/60 focus:ring-1 focus:ring-brand-500/30 transition-all placeholder-gray-600" required>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Threshold</label>
                <input type="number" id="screen-threshold" name="threshold" value="0.5" step="0.1" min="0" max="1" class="w-full bg-surface-950/60 border border-surface-700/60 rounded-xl px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-brand-500/60 focus:ring-1 focus:ring-brand-500/30 transition-all placeholder-gray-600">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1.5">Country (optional)</label>
                <input type="text" id="screen-country" name="country" value="Russia" class="w-full bg-surface-950/60 border border-surface-700/60 rounded-xl px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-brand-500/60 focus:ring-1 focus:ring-brand-500/30 transition-all placeholder-gray-600">
            </div>
        </div>

        <div class="mt-6 flex gap-4">
            <button type="button"
                hx-post="/screening/pep"
                hx-target="#screening-result"
                hx-indicator="#screening-loading"
                hx-include="[id^='screen-']"
                class="htmx-hide-on-request flex-1 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-amber-500/20 hover:shadow-amber-500/30 active:scale-[0.98]">
                Check PEP
            </button>
            <button type="button"
                hx-post="/screening/sanction"
                hx-target="#screening-result"
                hx-indicator="#screening-loading"
                hx-include="[id^='screen-']"
                class="htmx-hide-on-request flex-1 bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-orange-500/20 hover:shadow-orange-500/30 active:scale-[0.98]">
                Check Sanctions
            </button>
        </div>

        <div id="screening-loading" class="htmx-indicator justify-center py-3 mt-4">
            <div class="flex items-center gap-3 text-gray-400">
                <svg class="animate-spin w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                <span class="text-sm font-medium">Screening against global databases...</span>
            </div>
        </div>
    </div>

    <div id="screening-result"></div>
</div>
{{end}}
